--[--><astro-slot>  <astro-island uid="ZGDLaC" prefix="s0" component-url="/_astro/LandingPage.CffLmbLo.js" component-export="default" renderer-url="/_astro/client.DGkbExiB.js" props="{&quot;landing&quot;:[0,{&quot;key&quot;:[0,&quot;cuentos-para-ensenar-empatia-a-ninos&quot;],&quot;keyEs&quot;:[0,&quot;cuentos-para-ensenar-empatia-a-ninos&quot;],&quot;keyEn&quot;:[0,&quot;stories-to-teach-empathy-to-children&quot;],&quot;title&quot;:[0,&quot;Cuentos para Enseñar Empatía a Niños&quot;],&quot;keyword&quot;:[0,&quot;cuentos para enseñar empatía&quot;],&quot;category&quot;:[0,&quot;empatía&quot;],&quot;keywords&quot;:[1,[[0,&quot;empatía&quot;]]],&quot;description&quot;:[0,&quot;Cuentos que enseñan a niños a desarrollar compasión, conexión emocional, y la capacidad de entender y cuidar los sentimientos de otros.&quot;],&quot;content&quot;:[1,[[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;body&quot;:[0,&quot;&lt;p&gt;La empatía es la brújula moral que guía a los niños hacia relaciones saludables, comportamiento ético y liderazgo compasivo. Pero la empatía no es innata - se cultiva. Los cuentos para enseñar empatía son el método más efectivo para desarrollar esta habilidad crítica en una edad temprana.&lt;/p&gt;\n\n&lt;p&gt;A través de historias donde los personajes enfrentan dilemas emocionales, toman decisiones compasivas, y aprenden el impacto de sus acciones en otros, los niños internalizan la empatía de forma orgánica. No como obligación, sino como deseo genuino de cuidar a otros. Cada cuento es una lección sobre la importancia de entender los sentimientos ajenos.&lt;/p&gt;\n\n&lt;p&gt;En mundo cada vez más polarizado y divisivo, la empatía se ha convertido en la habilidad más valiosa que podemos enseñar a nuestros hijos. Un niño que entiende los sentimientos de otros, que se preocupa genuinamente por su bienestar, que actúa con compasión, es un niño que cambiará el mundo.&lt;/p&gt;&quot;]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;body&quot;:[0,&quot;&lt;h2&gt;Empatía: La Habilidad más Importante del Siglo XXI&lt;/h2&gt;\n&lt;p&gt;Mientras el mundo se vuelve más complejo y diverso, la empatía se convierte en la habilidad más valiosa que un niño puede desarrollar. Los cuentos para enseñar empatía preparan a los niños para ser ciudadanos del mundo que entienden, respetan y celebran la diversidad.&lt;/p&gt;\n\n&lt;p&gt;Un niño con empatía es un niño que puede resolver conflictos sin violencia, que puede liderar sin dominar, que puede amar sin condiciones. Es un niño que verá las diferencias como riqueza, no como amenaza.&lt;/p&gt;\n\n&lt;p&gt;La investigación neurocientífica muestra que cuando un niño escucha cuentos donde personajes diferentes son héroes, se activan las mismas regiones de su cerebro que si estuviera viviendo esa experiencia directamente. Esta es la magia de la empatía literaria: crea experiencia sin riesgo, práctica sin consecuencias reales.&lt;/p&gt;&quot;]}],[0,{&quot;type&quot;:[0,&quot;story_highlight&quot;],&quot;searchKeyword&quot;:[0,&quot;empatía&quot;],&quot;label&quot;:[0,&quot;Historias de Conexión&quot;]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;body&quot;:[0,&quot;&lt;h2&gt;De la Comprensión a la Acción Compasiva&lt;/h2&gt;\n&lt;p&gt;Los cuentos para enseñar empatía no solo enseñan comprensión - enseñan acción. Los niños no solo aprenden a entender los sentimientos de otros, sino a actuar con compasión. Ven que reconocer dolor ajeno sin hacer nada no es suficiente - que la empatía verdadera se expresa en acciones concretas.&lt;/p&gt;\n\n&lt;p&gt;Esta es la diferencia entre simpatía (sentir pena) y empatía (sentir con). Los cuentos cultivan verdadera empatía, donde los niños se sienten motivados a ayudar, consolar, incluir, y defender a otros.&lt;/p&gt;&quot;]}],[0,{&quot;type&quot;:[0,&quot;story_highlight&quot;],&quot;searchKeyword&quot;:[0,&quot;amistad&quot;],&quot;label&quot;:[0,&quot;Historias de Amistad&quot;]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;body&quot;:[0,&quot;&lt;h2&gt;Empatía en Acción: Desde el Hogar Hasta el Mundo&lt;/h2&gt;\n&lt;p&gt;Los cuentos para enseñar empatía comienzan en casa. Un niño que aprende empatía primero con su familia, luego la expande a amigos, a comunidad, a toda la humanidad. Esta es la semilla de un mundo más compasivo.&lt;/p&gt;\n\n&lt;p&gt;Cuando un niño escucha historias de empatía, internaliza que: todos tienen sentimientos que importan, que el dolor ajeno es real, que ayudar a otros es noble y gratificante, que la amabilidad transforma situaciones. Estos valores se convierten en pilares de su carácter.&lt;/p&gt;&quot;]}],[0,{&quot;type&quot;:[0,&quot;story_highlight&quot;],&quot;searchKeyword&quot;:[0,&quot;amor&quot;],&quot;label&quot;:[0,&quot;Historias de Compasión&quot;]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;body&quot;:[0,&quot;&lt;h2&gt;Empatía en la Era Digital: Más Importante que Nunca&lt;/h2&gt;\n&lt;p&gt;Vivimos en una era donde es fácil ignorar el dolor ajeno, donde podemos deshumanizar a otros detrás de pantallas, donde la división es casi la norma. En este contexto, la empatía se convierte en un acto revolucionario. Los cuentos para enseñar empatía preparan a los niños no solo para ser mejores personas, sino para ser portadores de cambio en un mundo que desesperadamente necesita más compasión.&lt;/p&gt;\n\n&lt;p&gt;Un niño que aprende empatía desde temprano desarrolla resiliencia emocional contra el odio, el prejuicio y la división. Cuando enfrenta a alguien diferente, no lo ve como amenaza - lo ve como otro ser humano con sentimientos, necesidades, historias propias. Esta visión transforma no solo sus relaciones personales, sino también su capacidad de ser un ciudadano responsable y compasivo.&lt;/p&gt;\n\n&lt;p&gt;Los cuentos para enseñar empatía son, entonces, no solo historias - son actos de resistencia contra la indiferencia, semillas de compasión plantadas en mentes jóvenes que florecerán en un mundo más justo.&lt;/p&gt;&quot;]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;body&quot;:[0,&quot;&lt;h2&gt;De Oyentes a Empáticos: El Viaje Comienza Aquí&lt;/h2&gt;\n&lt;p&gt;El primer paso en el camino hacia la empatía es escuchar - realmente escuchar - las historias de otros. Los cuentos para enseñar empatía hacen precisamente eso: permiten que los niños escuchen, que experimenten, que sientan las experiencias de personajes diversos. A través de esta escucha profunda, comienza el aprendizaje.&lt;/p&gt;\n\n&lt;p&gt;Cuando un niño escucha un cuento donde un personaje se siente solo, abandono, o rechazado, no está simplemente entretenido - está practicando empatía. Está ejercitando el músculo de la compasión. Y como cualquier músculo, más se ejercita, más fuerte se vuelve.&lt;/p&gt;\n\n&lt;p&gt;Los cuentos para enseñar empatía no crean niños \&quot;blandos\&quot; o incapaces de establecer límites. Al contrario, crean niños que pueden ser fuertes Y compasivos. Que pueden ser assertivos mientras aún se preocupan por otros. Que entienden que la verdadera fuerza incluye la capacidad de cuidar.&lt;/p&gt;\n\n&lt;p&gt;La empatía desarrollada a través de los cuentos es empatía informada - empatía que entiende contexto, que reconoce complejidad, que no es simplemente reacción emocional sino respuesta pensada. Un niño que ha escuchado cientos de cuentos donde personajes diversos navegan dilemas complejos desarrolla sofisticación emocional. Puede estar triste por alguien Y aún ser honesto si han actuado mal. Puede amar a alguien Y establecer límites necesarios. Esta es empatía adulta, y es lo que construye relaciones saludables en toda la vida.&lt;/p&gt;&quot;]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;body&quot;:[0,&quot;&lt;h2&gt;Crea un Mundo Más Empático, Un Cuento a la Vez&lt;/h2&gt;\n&lt;p&gt;&lt;strong&gt;¡Escucha ahora historias que cultivan empatía!&lt;/strong&gt; Explora nuestra colección curada de cuentos para enseñar empatía. Cada historia es una oportunidad para que tu hijo desarrolle la capacidad de amar profundamente, de cuidar genuinamente, de ser una fuerza de bondad en el mundo.&lt;/p&gt;\n\n&lt;p&gt;La empatía es el regalo más valioso que puedes darle a tu hijo. No es dinero, no es poder - es la capacidad de conectar con otros seres humanos, de entender sus necesidades, de contribuir a su bienestar. Los cuentos para enseñar empatía plantan esa semilla. El mundo que construya tu hijo con esa empatía, es ahora un poco más brillante.&lt;/p&gt;\n\n&lt;p&gt;Invierte en la educación emocional de tu hijo. Dedica tiempo a escuchar cuentos que cultiven empatía. Observa cómo gradualmente tu hijo comienza a notar más los sentimientos de otros, a ser más considerado, a mostrar una compasión auténtica. Este es el regalo que sigue dando para toda una vida.&lt;/p&gt;&quot;]}]]]}]}" ssr client="load" opts="{&quot;name&quot;:&quot;LandingPage&quot;,&quot;value&quot;:true}" await-children><div class="landing-page" data-v-5b6ab0b3><section class="carousel-hero" itemcount="20" data-v-5b6ab0b3 data-v-fb6028bf><div class="carousel-hero__background" data-v-fb6028bf><div class="glow glow--1" data-v-fb6028bf></div><div class="glow glow--2" data-v-fb6028bf></div><div class="glow glow--3" data-v-fb6028bf></div></div><div class="carousel-hero__container" data-v-fb6028bf><div class="carousel-hero__content" data-v-fb6028bf><h2 class="carousel-hero__subtitle" data-v-fb6028bf>Cuentos Recomendados</h2><h1 class="carousel-hero__title" data-v-fb6028bf>Cuentos para Enseñar Empatía a Niños</h1></div><div class="netflix-carousel-wrapper" data-v-fb6028bf><button class="netflix-nav--disabled netflix-nav netflix-nav--prev" data-v-fb6028bf> ‹ </button><div class="netflix-carousel-track" data-v-fb6028bf><!--[--><div data-story-key="el-traga-luces-un-cuento-de-misterio-y-luz" class="netflix-item" data-v-fb6028bf><div class="netflix-item__rank" data-v-fb6028bf>1</div><div class="netflix-item__poster" data-v-fb6028bf><img src="/assets/stories/es/el-traga-luces-un-cuento-de-misterio-y-luz.webp" alt="El Traga Luces: Un Cuento de Misterio y Luz" class="netflix-item__image" loading="lazy" data-v-fb6028bf></div><!----></div><div data-story-key="la-marana-de-secretos" class="netflix-item" data-v-fb6028bf><div class="netflix-item__rank" data-v-fb6028bf>2</div><div class="netflix-item__poster" data-v-fb6028bf><img src="/assets/stories/es/la-marana-de-secretos.webp" alt="La Maraña de Secretos" class="netflix-item__image" loading="lazy" data-v-fb6028bf></div><!----></div><div data-story-key="mia-y-el-secreto-de-las-siete-colas" class="netflix-item" data-v-fb6028bf><div class="netflix-item__rank" data-v-fb6028bf>3</div><div class="netflix-item__poster" data-v-fb6028bf><img src="/assets/stories/es/mia-y-el-secreto-de-las-siete-colas.webp" alt="Mía y el Secreto de las Siete Colas" class="netflix-item__image" loading="lazy" data-v-fb6028bf></div><!----></div><div data-story-key="la-luz-de-lucia" class="netflix-item" data-v-fb6028bf><div class="netflix-item__rank" data-v-fb6028bf>4</div><div class="netflix-item__poster" data-v-fb6028bf><img src="/assets/stories/es/la-luz-de-lucia.webp" alt="La Luz de Lucía" class="netflix-item__image" loading="lazy" data-v-fb6028bf></div><!----></div><div data-story-key="el-final-del-ayer" class="netflix-item" data-v-fb6028bf><div class="netflix-item__rank" data-v-fb6028bf>5</div><div class="netflix-item__poster" data-v-fb6028bf><img src="/assets/stories/es/el-final-del-ayer.webp" alt="El Final del Ayer" class="netflix-item__image" loading="lazy" data-v-fb6028bf></div><!----></div><!--]--></div><button class="netflix-nav--disabled netflix-nav netflix-nav--next" data-v-fb6028bf> › </button></div></div></section><div class="landing-content" data-v-5b6ab0b3 data-v-c076d352><!--[--><div class="blog-text" lang="es" data-v-c076d352 data-v-e4d26153><p>La empatía es la brújula moral que guía a los niños hacia relaciones saludables, comportamiento ético y liderazgo compasivo. Pero la empatía no es innata - se cultiva. Los cuentos para enseñar empatía son el método más efectivo para desarrollar esta habilidad crítica en una edad temprana.</p>

<p>A través de historias donde los personajes enfrentan dilemas emocionales, toman decisiones compasivas, y aprenden el impacto de sus acciones en otros, los niños internalizan la empatía de forma orgánica. No como obligación, sino como deseo genuino de cuidar a otros. Cada cuento es una lección sobre la importancia de entender los sentimientos ajenos.</p>

<p>En mundo cada vez más polarizado y divisivo, la empatía se ha convertido en la habilidad más valiosa que podemos enseñar a nuestros hijos. Un niño que entiende los sentimientos de otros, que se preocupa genuinamente por su bienestar, que actúa con compasión, es un niño que cambiará el mundo.</p></div><div class="blog-text" lang="es" data-v-c076d352 data-v-e4d26153><h2>Empatía: La Habilidad más Importante del Siglo XXI</h2>
<p>Mientras el mundo se vuelve más complejo y diverso, la empatía se convierte en la habilidad más valiosa que un niño puede desarrollar. Los cuentos para enseñar empatía preparan a los niños para ser ciudadanos del mundo que entienden, respetan y celebran la diversidad.</p>

<p>Un niño con empatía es un niño que puede resolver conflictos sin violencia, que puede liderar sin dominar, que puede amar sin condiciones. Es un niño que verá las diferencias como riqueza, no como amenaza.</p>

<p>La investigación neurocientífica muestra que cuando un niño escucha cuentos donde personajes diferentes son héroes, se activan las mismas regiones de su cerebro que si estuviera viviendo esa experiencia directamente. Esta es la magia de la empatía literaria: crea experiencia sin riesgo, práctica sin consecuencias reales.</p></div><div class="story-highlight" data-v-c076d352 data-v-b72f9e33><a href="/cuento/la-luz-de-lucia/" class="story-highlight__link" data-v-b72f9e33><div class="story-highlight__image-wrapper" data-v-b72f9e33><img src="/assets/stories/es/la-luz-de-lucia.webp" alt="La Luz de Lucía" class="story-highlight__image" loading="lazy" data-v-b72f9e33><div class="story-highlight__overlay" data-v-b72f9e33></div></div><div class="story-highlight__content" data-v-b72f9e33><div class="story-highlight__header" data-v-b72f9e33><span class="story-highlight__label" data-v-b72f9e33>Historias de Conexión</span><span class="story-highlight__icon" data-v-b72f9e33>→</span></div><h4 class="story-highlight__title" data-v-b72f9e33>La Luz de Lucía</h4><p class="story-highlight__description" data-v-b72f9e33>Había una vez, en un rincón mágico del bosque, una pequeña luciérnaga llamada Lucía. Lucía no era una luciérnaga cualquiera; su luz brillaba con colores que cambiaban como un arco...</p><div class="story-highlight__meta" data-v-b72f9e33><span class="story-highlight__time" data-v-b72f9e33>5 min</span><span class="story-highlight__cta" data-v-b72f9e33>Escucha Ahora</span></div></div></a></div><div class="blog-text" lang="es" data-v-c076d352 data-v-e4d26153><h2>De la Comprensión a la Acción Compasiva</h2>
<p>Los cuentos para enseñar empatía no solo enseñan comprensión - enseñan acción. Los niños no solo aprenden a entender los sentimientos de otros, sino a actuar con compasión. Ven que reconocer dolor ajeno sin hacer nada no es suficiente - que la empatía verdadera se expresa en acciones concretas.</p>

<p>Esta es la diferencia entre simpatía (sentir pena) y empatía (sentir con). Los cuentos cultivan verdadera empatía, donde los niños se sienten motivados a ayudar, consolar, incluir, y defender a otros.</p></div><div class="story-highlight" data-v-c076d352 data-v-b72f9e33><a href="/cuento/la-luz-de-lucia/" class="story-highlight__link" data-v-b72f9e33><div class="story-highlight__image-wrapper" data-v-b72f9e33><img src="/assets/stories/es/la-luz-de-lucia.webp" alt="La Luz de Lucía" class="story-highlight__image" loading="lazy" data-v-b72f9e33><div class="story-highlight__overlay" data-v-b72f9e33></div></div><div class="story-highlight__content" data-v-b72f9e33><div class="story-highlight__header" data-v-b72f9e33><span class="story-highlight__label" data-v-b72f9e33>Historias de Amistad</span><span class="story-highlight__icon" data-v-b72f9e33>→</span></div><h4 class="story-highlight__title" data-v-b72f9e33>La Luz de Lucía</h4><p class="story-highlight__description" data-v-b72f9e33>Había una vez, en un rincón mágico del bosque, una pequeña luciérnaga llamada Lucía. Lucía no era una luciérnaga cualquiera; su luz brillaba con colores que cambiaban como un arco...</p><div class="story-highlight__meta" data-v-b72f9e33><span class="story-highlight__time" data-v-b72f9e33>5 min</span><span class="story-highlight__cta" data-v-b72f9e33>Escucha Ahora</span></div></div></a></div><div class="blog-text" lang="es" data-v-c076d352 data-v-e4d26153><h2>Empatía en Acción: Desde el Hogar Hasta el Mundo</h2>
<p>Los cuentos para enseñar empatía comienzan en casa. Un niño que aprende empatía primero con su familia, luego la expande a amigos, a comunidad, a toda la humanidad. Esta es la semilla de un mundo más compasivo.</p>

<p>Cuando un niño escucha historias de empatía, internaliza que: todos tienen sentimientos que importan, que el dolor ajeno es real, que ayudar a otros es noble y gratificante, que la amabilidad transforma situaciones. Estos valores se convierten en pilares de su carácter.</p></div><div class="story-highlight" data-v-c076d352 data-v-b72f9e33><a href="/cuento/el-final-del-ayer/" class="story-highlight__link" data-v-b72f9e33><div class="story-highlight__image-wrapper" data-v-b72f9e33><img src="/assets/stories/es/el-final-del-ayer.webp" alt="El Final del Ayer" class="story-highlight__image" loading="lazy" data-v-b72f9e33><div class="story-highlight__overlay" data-v-b72f9e33></div></div><div class="story-highlight__content" data-v-b72f9e33><div class="story-highlight__header" data-v-b72f9e33><span class="story-highlight__label" data-v-b72f9e33>Historias de Compasión</span><span class="story-highlight__icon" data-v-b72f9e33>→</span></div><h4 class="story-highlight__title" data-v-b72f9e33>El Final del Ayer</h4><p class="story-highlight__description" data-v-b72f9e33>Era un día soleado en el pequeño pueblo de Valle Colorido. Las flores danzaban al ritmo de la brisa y las mariposas parecían tener prisa por contarles a todos los...</p><div class="story-highlight__meta" data-v-b72f9e33><span class="story-highlight__time" data-v-b72f9e33>4 min</span><span class="story-highlight__cta" data-v-b72f9e33>Escucha Ahora</span></div></div></a></div><div class="blog-text" lang="es" data-v-c076d352 data-v-e4d26153><h2>Empatía en la Era Digital: Más Importante que Nunca</h2>
<p>Vivimos en una era donde es fácil ignorar el dolor ajeno, donde podemos deshumanizar a otros detrás de pantallas, donde la división es casi la norma. En este contexto, la empatía se convierte en un acto revolucionario. Los cuentos para enseñar empatía preparan a los niños no solo para ser mejores personas, sino para ser portadores de cambio en un mundo que desesperadamente necesita más compasión.</p>

<p>Un niño que aprende empatía desde temprano desarrolla resiliencia emocional contra el odio, el prejuicio y la división. Cuando enfrenta a alguien diferente, no lo ve como amenaza - lo ve como otro ser humano con sentimientos, necesidades, historias propias. Esta visión transforma no solo sus relaciones personales, sino también su capacidad de ser un ciudadano responsable y compasivo.</p>

<p>Los cuentos para enseñar empatía son, entonces, no solo historias - son actos de resistencia contra la indiferencia, semillas de compasión plantadas en mentes jóvenes que florecerán en un mundo más justo.</p></div><div class="blog-text" lang="es" data-v-c076d352 data-v-e4d26153><h2>De Oyentes a Empáticos: El Viaje Comienza Aquí</h2>
<p>El primer paso en el camino hacia la empatía es escuchar - realmente escuchar - las historias de otros. Los cuentos para enseñar empatía hacen precisamente eso: permiten que los niños escuchen, que experimenten, que sientan las experiencias de personajes diversos. A través de esta escucha profunda, comienza el aprendizaje.</p>

<p>Cuando un niño escucha un cuento donde un personaje se siente solo, abandono, o rechazado, no está simplemente entretenido - está practicando empatía. Está ejercitando el músculo de la compasión. Y como cualquier músculo, más se ejercita, más fuerte se vuelve.</p>

<p>Los cuentos para enseñar empatía no crean niños "blandos" o incapaces de establecer límites. Al contrario, crean niños que pueden ser fuertes Y compasivos. Que pueden ser assertivos mientras aún se preocupan por otros. Que entienden que la verdadera fuerza incluye la capacidad de cuidar.</p>

<p>La empatía desarrollada a través de los cuentos es empatía informada - empatía que entiende contexto, que reconoce complejidad, que no es simplemente reacción emocional sino respuesta pensada. Un niño que ha escuchado cientos de cuentos donde personajes diversos navegan dilemas complejos desarrolla sofisticación emocional. Puede estar triste por alguien Y aún ser honesto si han actuado mal. Puede amar a alguien Y establecer límites necesarios. Esta es empatía adulta, y es lo que construye relaciones saludables en toda la vida.</p></div><div class="blog-text" lang="es" data-v-c076d352 data-v-e4d26153><h2>Crea un Mundo Más Empático, Un Cuento a la Vez</h2>
<p><strong>¡Escucha ahora historias que cultivan empatía!</strong> Explora nuestra colección curada de cuentos para enseñar empatía. Cada historia es una oportunidad para que tu hijo desarrolle la capacidad de amar profundamente, de cuidar genuinamente, de ser una fuerza de bondad en el mundo.</p>

<p>La empatía es el regalo más valioso que puedes darle a tu hijo. No es dinero, no es poder - es la capacidad de conectar con otros seres humanos, de entender sus necesidades, de contribuir a su bienestar. Los cuentos para enseñar empatía plantan esa semilla. El mundo que construya tu hijo con esa empatía, es ahora un poco más brillante.</p>

<p>Invierte en la educación emocional de tu hijo. Dedica tiempo a escuchar cuentos que cultiven empatía. Observa cómo gradualmente tu hijo comienza a notar más los sentimientos de otros, a ser más considerado, a mostrar una compasión auténtica. Este es el regalo que sigue dando para toda una vida.</p></div><!--]--></div></div><!--astro:end--></astro-island>  </astro-slot><!--]--><footer class="footer animate-fadeInUp animate-delay-2" data-v-5cc0f3dd data-v-9b86ea75><div class="v-container v-container--bs footer-container stagger-children" data-v-9b86ea75><!--[--><div class="footer-header" data-v-9b86ea75><h3 class="v-text v-text--header footer-title" style="" data-v-9b86ea75><!--[-->La Voz De Los Cuentos v0.1.426<!--]--></h3></div><div class="footer-newsletter" data-v-9b86ea75><div class="v-text v-text--subtitle footer-section-title" style="" data-v-9b86ea75><!--[-->Newsletter Mensual<!--]--></div><div class="v-field newsletter-field" data-v-9b86ea75><!--[--><label class="v-text v-text--label v-text--high v-text--b3 v-field-label" style="" for="emailInput" data-v-9b86ea75><!--[--><!--[-->Email:<!--]--><!--]--></label><!--]--><div class="v-field__wrapper"><!--[--><input id="emailInput" class="v-input" type="email" placeholder="tu@email.com" aria-describedby="fb34e5e1-c48f-4a7a-a8ca-adf5443e724a" aria-invalid="false" aria-label="Input Email Newsletter" name="emailInput" value data-v-9b86ea75><button class="v-button v-button--primary v-button--bs v-button--disabled v-button--gap newsletter-button btn-playful" type="button" disabled data-v-9b86ea75><!----><!----><div class="v-text v-text--label v-text--b3 v-button__text" style=""><!--[--><!--[-->Enviar<!--]--><!--]--></div><!----></button><!--]--></div><!--[--><!--]--></div></div><div class="footer-content" data-v-9b86ea75><div class="footer-section" data-v-9b86ea75><div class="v-text v-text--subtitle footer-section-title" style="" data-v-9b86ea75><!--[-->Nuestros Sitios<!--]--></div><div class="footer-links" data-v-9b8
